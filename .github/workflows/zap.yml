name: DAST (OWASP ZAP baseline)

on:
  pull_request:
    paths:
      - "app/**"
      - "Dockerfile**"
      - "pyproject.toml"
      - "uv.lock"
      - ".zap/**"
      - ".github/workflows/zap.yml"
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC
  workflow_dispatch: {}

concurrency:
  group: zap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write

jobs:
  zap-baseline:
    name: ZAP baseline scan
    runs-on: ubuntu-latest

    services:
      app:
        image: ghcr.io/pa04rth/securepipeline:latest
        ports:
          - 8000:8000
        # ZAP only starts after the service container reports healthy.
        options: >-
          --health-cmd "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: "http://localhost:8000"
          cmd_options: "-a"
          rules_file_name: ".zap/rules.tsv"
          fail_action: true # PR red on findings ≥ WARN per rules.tsv
          allow_issue_writing: false
          artifact_name: zap-baseline

      - name: Convert ZAP JSON → SARIF
        if: always() # run even when ZAP failed the severity gate
        uses: SvanBoxel/zaproxy-to-ghas@v1.0.2
        # reads report_json.json from the workspace, writes results.sarif

      - name: Upload ZAP SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: zap-baseline

      - name: Upload ZAP reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-reports
          path: |
            report_html.html
            report_md.md
            report_json.json
          retention-days: 14
          if-no-files-found: warn
