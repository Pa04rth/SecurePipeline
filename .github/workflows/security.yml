name: Security
on: [push, pull_request]

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-gitleaks
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Gitleaks (secrets scan)"
            echo ""
            if [ -f results.sarif ]; then
              count=$(jq '[.runs[].results[]] | length' results.sarif 2>/dev/null || echo 0)
              echo "**Findings:** $count"
            else
              echo "_No SARIF produced (likely clean scan)._"
            fi
            echo ""
            echo "[View in Code Scanning](https://github.com/${GITHUB_REPOSITORY}/security/code-scanning?query=tool:gitleaks)"
          } >> "$GITHUB_STEP_SUMMARY"

  sast:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --error \
            --sarif --output semgrep.sarif

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-semgrep
          path: semgrep.sarif
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Semgrep (SAST)"
            echo ""
            if [ -f semgrep.sarif ]; then
              count=$(jq '[.runs[].results[]] | length' semgrep.sarif 2>/dev/null || echo 0)
              echo "**Findings:** $count"
            else
              echo "_No SARIF produced._"
            fi
            echo ""
            echo "[View in Code Scanning](https://github.com/${GITHUB_REPOSITORY}/security/code-scanning?query=tool:Semgrep)"
          } >> "$GITHUB_STEP_SUMMARY"

  sca:
    name: SCA (trivy fs-scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-trivy-fs
          path: trivy-results.sarif
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Trivy filesystem (SCA)"
            echo ""
            if [ -f trivy-results.sarif ]; then
              count=$(jq '[.runs[].results[]] | length' trivy-results.sarif 2>/dev/null || echo 0)
              echo "**Findings (HIGH/CRITICAL):** $count"
            else
              echo "_No SARIF produced._"
            fi
            echo ""
            echo "[View in Code Scanning](https://github.com/${GITHUB_REPOSITORY}/security/code-scanning?query=tool:Trivy)"
          } >> "$GITHUB_STEP_SUMMARY"
