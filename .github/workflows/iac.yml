name: IaC Scans

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/iac.yml"
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/iac.yml"

concurrency:
  group: iac-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  fmt-validate:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vendor modules
        run: |
          mkdir -p infra/vendor
          git clone --branch v5.21.0 --depth 1 \
            https://github.com/terraform-aws-modules/terraform-aws-vpc.git \
            infra/vendor/terraform-aws-vpc
          git clone --branch v20.31.6 --depth 1 \
            https://github.com/terraform-aws-modules/terraform-aws-eks.git \
            infra/vendor/terraform-aws-eks
          git clone --branch v2.1.0 --depth 1 \
            https://github.com/terraform-aws-modules/terraform-aws-kms.git \
            infra/vendor/terraform-aws-kms
          # Patch the EKS module's KMS submodule reference to point at the vendored copy:
          # rewrite the source AND drop the version line (invalid for local sources).
          # awk handles the "scoped to module block" case sed can't do cleanly.
          awk '
            /^module "kms"/                       { in_kms = 1 }
            in_kms && /^}/                        { in_kms = 0; print; next }
            in_kms && /terraform-aws-modules\/kms\/aws/ {
              sub(/"terraform-aws-modules\/kms\/aws"/, "\"../terraform-aws-kms\"")
              print; next
            }
            in_kms && /^[[:space:]]+version[[:space:]]*=/ { next }
            { print }
          ' infra/vendor/terraform-aws-eks/main.tf > infra/vendor/terraform-aws-eks/main.tf.patched
          mv infra/vendor/terraform-aws-eks/main.tf.patched infra/vendor/terraform-aws-eks/main.tf
          # Show the patched kms block + sanity-check there's no version left in it.
          echo "── Patched kms block ──"
          awk '/^module "kms"/,/^}/' infra/vendor/terraform-aws-eks/main.tf
          echo "────────────────────────"
          if awk '/^module "kms"/,/^}/' infra/vendor/terraform-aws-eks/main.tf | grep -qE '^[[:space:]]+version'; then
            echo "ERROR: version line still present in module \"kms\" block."
            exit 1
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: terraform fmt
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: infra/terraform
        run: terraform validate

  checkov:
    name: Checkov (IaC policy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vendor modules
        run: |
          mkdir -p infra/vendor
          git clone --branch v5.21.0 --depth 1 \
            https://github.com/terraform-aws-modules/terraform-aws-vpc.git \
            infra/vendor/terraform-aws-vpc
          git clone --branch v20.31.6 --depth 1 \
            https://github.com/terraform-aws-modules/terraform-aws-eks.git \
            infra/vendor/terraform-aws-eks
          git clone --branch v2.1.0 --depth 1 \
            https://github.com/terraform-aws-modules/terraform-aws-kms.git \
            infra/vendor/terraform-aws-kms
          # Patch the EKS module's KMS submodule reference to point at the vendored copy:
          # rewrite the source AND drop the version line (invalid for local sources).
          # awk handles the "scoped to module block" case sed can't do cleanly.
          awk '
            /^module "kms"/                       { in_kms = 1 }
            in_kms && /^}/                        { in_kms = 0; print; next }
            in_kms && /terraform-aws-modules\/kms\/aws/ {
              sub(/"terraform-aws-modules\/kms\/aws"/, "\"../terraform-aws-kms\"")
              print; next
            }
            in_kms && /^[[:space:]]+version[[:space:]]*=/ { next }
            { print }
          ' infra/vendor/terraform-aws-eks/main.tf > infra/vendor/terraform-aws-eks/main.tf.patched
          mv infra/vendor/terraform-aws-eks/main.tf.patched infra/vendor/terraform-aws-eks/main.tf
          # Show the patched kms block + sanity-check there's no version left in it.
          echo "── Patched kms block ──"
          awk '/^module "kms"/,/^}/' infra/vendor/terraform-aws-eks/main.tf
          echo "────────────────────────"
          if awk '/^module "kms"/,/^}/' infra/vendor/terraform-aws-eks/main.tf | grep -qE '^[[:space:]]+version'; then
            echo "ERROR: version line still present in module \"kms\" block."
            exit 1
          fi

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform
          framework: terraform
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: false # fail the job on findings
          quiet: true
          config_file: infra/terraform/.checkov.yaml

      - name: Upload Checkov SARIF
        if: always() # upload even if Checkov failed
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov
      - name: Upload Checkov SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-checkov
          path: checkov.sarif/results_sarif.sarif
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Checkov (IaC policy)"
            echo ""
            if [ -f checkov.sarif/results_sarif.sarif ]; then
              count=$(jq '[.runs[].results[]] | length' checkov.sarif/results_sarif.sarif 2>/dev/null || echo 0)
              echo "**Findings:** $count"
            else
              echo "_No SARIF produced._"
            fi
            echo ""
            echo "[View in Code Scanning](https://github.com/${GITHUB_REPOSITORY}/security/code-scanning?query=tool:Checkov)"
          } >> "$GITHUB_STEP_SUMMARY"

  trivy:
    name: Trivy (tfsec/IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vendor modules
        run: |
          mkdir -p infra/vendor
          git clone --branch v5.21.0 --depth 1 \
            https://github.com/terraform-aws-modules/terraform-aws-vpc.git \
            infra/vendor/terraform-aws-vpc
          git clone --branch v20.31.6 --depth 1 \
            https://github.com/terraform-aws-modules/terraform-aws-eks.git \
            infra/vendor/terraform-aws-eks
          git clone --branch v2.1.0 --depth 1 \
            https://github.com/terraform-aws-modules/terraform-aws-kms.git \
            infra/vendor/terraform-aws-kms
          # Patch the EKS module's KMS submodule reference to point at the vendored copy:
          # rewrite the source AND drop the version line (invalid for local sources).
          # awk handles the "scoped to module block" case sed can't do cleanly.
          awk '
            /^module "kms"/                       { in_kms = 1 }
            in_kms && /^}/                        { in_kms = 0; print; next }
            in_kms && /terraform-aws-modules\/kms\/aws/ {
              sub(/"terraform-aws-modules\/kms\/aws"/, "\"../terraform-aws-kms\"")
              print; next
            }
            in_kms && /^[[:space:]]+version[[:space:]]*=/ { next }
            { print }
          ' infra/vendor/terraform-aws-eks/main.tf > infra/vendor/terraform-aws-eks/main.tf.patched
          mv infra/vendor/terraform-aws-eks/main.tf.patched infra/vendor/terraform-aws-eks/main.tf
          # Show the patched kms block + sanity-check there's no version left in it.
          echo "── Patched kms block ──"
          awk '/^module "kms"/,/^}/' infra/vendor/terraform-aws-eks/main.tf
          echo "────────────────────────"
          if awk '/^module "kms"/,/^}/' infra/vendor/terraform-aws-eks/main.tf | grep -qE '^[[:space:]]+version'; then
            echo "ERROR: version line still present in module \"kms\" block."
            exit 1
          fi
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/terraform
          severity: HIGH,CRITICAL
          exit-code: "1" # fail the job on findings
          format: sarif
          output: trivy-iac.sarif
          trivyignores: infra/terraform/.trivyignore

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

      - name: Upload Trivy SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-trivy-iac
          path: trivy-iac.sarif
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Trivy (IaC config)"
            echo ""
            if [ -f trivy-iac.sarif ]; then
              count=$(jq '[.runs[].results[]] | length' trivy-iac.sarif 2>/dev/null || echo 0)
              echo "**Findings (HIGH/CRITICAL):** $count"
            else
              echo "_No SARIF produced._"
            fi
            echo ""
            echo "[View in Code Scanning](https://github.com/${GITHUB_REPOSITORY}/security/code-scanning?query=tool:Trivy)"
          } >> "$GITHUB_STEP_SUMMARY"
