name: Build Docker Image

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Dev Image
        run: make docker-dev

      - name: Build Prod Image
        run: make docker-prod
