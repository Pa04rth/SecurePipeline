global:
  enabled: true
  tlsDisable: true

server:
  dev:
    enabled: true
    devRootToken: "root"

  logLevel: "info"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  service:
    enabled: true
    type: ClusterIP

injector:
  enabled: false

ui:
  enabled: true
  serviceType: "ClusterIP"
