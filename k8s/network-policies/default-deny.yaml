# Default-deny baseline for every namespace in the platform.
# After this applies, NO pod can talk to ANY other pod in these namespaces
# until a more-specific allow policy lets it through.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: default
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
