# Allow External Secrets Operator pods to reach Vault on port 8200.
# Policy lives in external-secrets namespace and selects the ESO controller pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eso-to-vault
  namespace: external-secrets
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
      ports:
        - protocol: TCP
          port: 8200
